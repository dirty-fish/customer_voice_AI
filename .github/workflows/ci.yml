name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: customer_voice_ai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d customer_voice_ai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:55432/customer_voice_ai
      LLM_API_KEY: ""
      LLM_BASE_URL: ""
      LLM_MODEL: gpt-4.1-mini
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Lint
        run: ruff check src tests scripts

      - name: Test
        run: pytest -m "not integration"