services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: customer_voice_ai_postgres
    environment:
      POSTGRES_DB: customer_voice_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customer_voice_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: